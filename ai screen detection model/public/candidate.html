<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Candidate Interview Room</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero compact">
        <div class="badge">Candidate Portal</div>
        <h1>Secure interview room</h1>
        <p class="lead" id="candidate-summary">Enter through the issued invite only. Monitoring remains active throughout the session.</p>
      </section>

      <section class="grid two">
        <div class="card">
          <div class="header-row">
            <div>
              <div class="badge">Camera</div>
              <h2>Live preview</h2>
            </div>
            <button class="button secondary" id="enter-fullscreen">Enter fullscreen</button>
          </div>
          <video id="camera" class="preview" autoplay muted playsinline></video>
          <canvas id="analysis-canvas" width="320" height="240" hidden></canvas>
        </div>

        <div class="card">
          <div class="badge">Monitoring Status</div>
          <h2>Checks and controls</h2>
          <div id="status-list" class="stack"></div>
          <div class="notice" id="admin-warning">No admin warning.</div>
        </div>
      </section>
    </main>
    <script type="module" src="/assets/candidate.js"></script>
  </body>
  </html>
